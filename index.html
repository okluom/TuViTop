<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        var _fetch = window.fetch;
        var _currentFetch = _fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return _currentFetch;
            },
            set: function(val) {
              _currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Failed to redefine window.fetch descriptor:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
